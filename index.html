<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5c518" />
  <meta name="description" content="FUBY Tracker — Gamified goal tracker. Level up your life." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FUBY" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>FUBY Tracker</title>

  <style>
    /* ── FONTS ── */
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

    /* ── VARIABLES ── */
    :root {
      --bg:        #080808;
      --bg2:       #0f0f0f;
      --bg3:       #141414;
      --bg4:       #1a1a1a;
      --gold:      #f5c518;
      --gold2:     #d4a017;
      --gold3:     #b8860b;
      --crimson:   #c0392b;
      --dark-red:  #8b0000;
      --text:      #f0f0f0;
      --text-dim:  #888;
      --text-gold: #e8c96a;
      --green:     #1db954;
      --border:    rgba(245,197,24,0.12);
      --border2:   rgba(245,197,24,0.25);
      --glow:      0 0 20px rgba(245,197,24,0.3);
      --glow-sm:   0 0 10px rgba(245,197,24,0.2);
      --radius:    14px;
      --radius-sm: 8px;
      --font-title: 'Bebas Neue', sans-serif;
      --font-ui:    'Rajdhani', sans-serif;
      --font-mono:  'Space Mono', monospace;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input  { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--gold3); border-radius: 4px; }

    /* ── LAYOUT ── */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, var(--bg) 0%, rgba(8,8,8,0.95) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .brand-name {
      font-family: var(--font-title);
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-shadow: var(--glow);
      line-height: 1;
    }

    .brand-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-notif {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-notif:active { transform: scale(0.92); }

    /* ── XP BAR ── */
    .xp-bar-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .xp-bar-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #level-label {
      font-family: var(--font-title);
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 1px;
    }

    #xp-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-gold);
    }

    .xp-bar-track {
      height: 6px;
      background: var(--bg4);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold3), var(--gold));
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 12px rgba(245,197,24,0.6);
      position: relative;
    }
    #xp-bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 12px;
      background: rgba(255,255,255,0.4);
      border-radius: 99px;
      filter: blur(3px);
    }

    /* ── AFFIRMATION BANNER ── */
    #affirmation-banner {
      margin: 14px 20px 0;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(245,197,24,0.06) 0%, rgba(192,57,43,0.06) 100%);
      border: 1px solid var(--border);
      border-left: 3px solid var(--crimson);
      border-radius: var(--radius-sm);
      cursor: pointer;
      user-select: none;
    }

    .affirmation-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--crimson);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    #affirmation-text {
      font-size: 0.9rem;
      color: var(--text-gold);
      line-height: 1.5;
      font-style: italic;
      transition: opacity 0.3s;
    }
    #affirmation-text.fade-anim { opacity: 0; }

    /* ── STATS STRIP ── */
    #stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin: 14px 20px 0;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .stat-cell {
      background: var(--bg2);
      padding: 10px 8px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: var(--gold);
      line-height: 1;
      display: block;
      margin-bottom: 3px;
    }

    .stat-lbl {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: var(--font-mono);
    }

    /* ── TABS ── */
    #tabs {
      display: flex;
      gap: 2px;
      margin: 14px 20px 0;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--bg4);
      color: var(--gold);
      box-shadow: inset 0 0 0 1px var(--border2);
    }

    /* ── GOALS AREA ── */
    #goals-area {
      flex: 1;
      padding: 16px 20px 120px;
      overflow-y: auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-title);
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    .badge-count {
      background: var(--dark-red);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* ── GOAL CARD ── */
    .goal-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .goal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .goal-card:hover::before, .goal-card:focus-within::before { opacity: 1; }
    .goal-card.completed { border-color: rgba(29,185,84,0.25); }
    .goal-card.completed::before { background: linear-gradient(90deg, transparent, var(--green), transparent); opacity: 0.6; }
    .goal-card.overdue { border-color: rgba(192,57,43,0.5); }
    .goal-card.overdue::before { background: linear-gradient(90deg, transparent, var(--crimson), transparent); opacity: 1; }

    .goal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .goal-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .goal-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .goal-status-dot.active  { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
    .goal-status-dot.done    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .goal-status-dot.late    { background: var(--crimson); box-shadow: 0 0 6px var(--crimson); }

    .goal-title {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.3;
    }

    .goal-due {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .goal-due.overdue-badge { color: var(--crimson); }

    /* ── PROGRESS BAR (per goal) ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .progress-bar-track {
      flex: 1;
      height: 5px;
      background: var(--bg4);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold3), var(--gold));
      border-radius: 99px;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px rgba(245,197,24,0.5);
    }
    .progress-bar-fill.full {
      background: linear-gradient(90deg, #1a7a3c, var(--green));
      box-shadow: 0 0 8px rgba(29,185,84,0.5);
    }
    .progress-pct {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-gold);
      min-width: 28px;
      text-align: right;
    }

    /* ── SUBTASKS ── */
    .subtasks-list { margin-bottom: 10px; }

    .subtask {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .subtask:last-child { border-bottom: none; }
    .subtask.done .subtask-text {
      color: var(--text-dim);
      text-decoration: line-through;
    }

    .tick-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .tick-btn:active { transform: scale(0.85); }
    .tick-btn.ticked {
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(245,197,24,0.5);
    }

    .tick-empty {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--text-dim);
      display: block;
    }
    .tick-check {
      color: var(--bg);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .subtask-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── ADD SUBTASK ── */
    .add-subtask-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .subtask-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .subtask-input:focus { border-color: var(--gold2); }
    .subtask-input::placeholder { color: var(--text-dim); }

    .btn-add-task {
      width: 36px; height: 36px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--gold);
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-add-task:active { transform: scale(0.9); background: var(--bg4); }

    /* ── GOAL FOOTER ── */
    .goal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .xp-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--gold);
      background: rgba(245,197,24,0.1);
      padding: 3px 8px;
      border-radius: 99px;
      border: 1px solid rgba(245,197,24,0.2);
    }
    .task-count {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    /* ── BTN ICON (delete) ── */
    .btn-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      color: var(--text-dim);
      font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { color: var(--crimson); }
    .btn-icon:active { transform: scale(0.85); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-sub { font-size: 0.85rem; margin-top: 8px; }
    .empty-sub strong { color: var(--gold); }

    /* ── FAB ── */
    #fab {
      position: fixed;
      bottom: 28px;
      right: 50%;
      transform: translateX(50%);
      /* centred on screen but capped at 480px */
      z-index: 200;
    }
    @media (min-width: 480px) {
      #fab { right: calc(50% - 220px); transform: none; }
    }

    .fab-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--bg);
      font-family: var(--font-title);
      font-size: 1rem;
      letter-spacing: 2px;
      padding: 14px 28px;
      border-radius: 99px;
      box-shadow: 0 0 24px rgba(245,197,24,0.45), 0 4px 20px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .fab-btn:active { transform: scale(0.95); box-shadow: 0 0 14px rgba(245,197,24,0.3); }
    .fab-plus { font-size: 1.4rem; line-height: 1; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .modal-overlay.visible .modal-sheet {
      transform: translateY(0);
    }

    .modal-sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--bg4);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-family: var(--font-title);
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font-ui);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold2); }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input[type="date"] { color-scheme: dark; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .btn-primary {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--bg);
      font-family: var(--font-title);
      font-size: 1.1rem;
      letter-spacing: 2px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .btn-secondary {
      padding: 14px 20px;
      background: var(--bg3);
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .btn-secondary:active { opacity: 0.75; }

    /* ── LEVEL UP OVERLAY ── */
    #levelup-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #levelup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #levelup-emoji {
      font-size: 6rem;
      animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .levelup-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--crimson);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin: 16px 0 6px;
      animation: fade-up 0.5s 0.3s both;
    }

    #levelup-name {
      font-family: var(--font-title);
      font-size: 3.5rem;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(245,197,24,0.8);
      letter-spacing: 4px;
      animation: fade-up 0.5s 0.4s both;
    }

    .levelup-sub {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 12px;
      animation: fade-up 0.5s 0.6s both;
    }

    /* ── TOAST ── */
    .toast-complete {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--bg3), var(--bg4));
      border: 1px solid var(--gold3);
      color: var(--text-gold);
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      z-index: 400;
      box-shadow: var(--glow);
      max-width: 90vw;
      text-align: center;
      white-space: normal;
    }
    .toast-complete.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      top: -10px;
      z-index: 600;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── ANIMATIONS ── */
    @keyframes bounce-in {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      70%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 8px rgba(245,197,24,0.3); }
      50%       { box-shadow: 0 0 20px rgba(245,197,24,0.7); }
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      margin: 10px 20px 0;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(139,0,0,0.3), rgba(192,57,43,0.15));
      border: 1px solid rgba(192,57,43,0.35);
      border-radius: var(--radius-sm);
      gap: 10px;
      align-items: center;
    }
    #install-banner.show { display: flex; }
    .install-text { flex: 1; font-size: 0.82rem; color: var(--text); }
    .install-text strong { color: var(--gold); }
    .btn-install {
      background: var(--crimson);
      color: white;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 7px 14px;
      border-radius: 6px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-install:active { opacity: 0.8; }
    .btn-dismiss {
      color: var(--text-dim);
      font-size: 0.8rem;
      padding: 4px;
    }

    /* ── REMINDER TAB ── */
    #reminder-section {
      margin: 14px 20px 0;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(139,0,0,0.15), rgba(8,8,8,0));
      border: 1px solid rgba(139,0,0,0.25);
      border-radius: var(--radius-sm);
    }
    .reminder-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .reminder-title {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--crimson);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .btn-notif-small {
      font-size: 0.72rem;
      color: var(--gold);
      font-family: var(--font-mono);
      text-decoration: underline;
      background: none;
      border: none;
      cursor: pointer;
    }
    #reminder-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- ── APP ─────────────────────────────────────── -->
<div id="app">

  <!-- INSTALL BANNER (shown when PWA can be installed) -->
  <div id="install-banner">
    <span class="install-text"><strong>Install FUBY</strong> to your home screen for offline access</span>
    <button class="btn-install" id="install-btn">Install</button>
    <button class="btn-dismiss" id="dismiss-install">✕</button>
  </div>

  <!-- HEADER -->
  <header id="header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-name">FUBY</span>
        <span class="brand-tag">TRACKER</span>
      </div>
      <div class="header-actions">
        <button class="btn-notif" onclick="FUBY.requestNotifications()" title="Enable reminders">🔔</button>
      </div>
    </div>

    <!-- XP BAR -->
    <div class="xp-bar-section">
      <div class="xp-bar-labels">
        <span id="level-label">🌱 Rookie</span>
        <span id="xp-label">0 XP</span>
      </div>
      <div class="xp-bar-track">
        <div id="xp-bar-fill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- AFFIRMATION BANNER -->
  <div id="affirmation-banner" onclick="FUBY.nextAffirmation()" title="Tap for next affirmation">
    <div class="affirmation-label">✦ Daily Affirmation</div>
    <div id="affirmation-text">Loading…</div>
  </div>

  <!-- REMINDER SECTION -->
  <div id="reminder-section">
    <div class="reminder-header">
      <span class="reminder-title">⚡ Power Reminder</span>
      <button class="btn-notif-small" onclick="FUBY.requestNotifications()">Enable alerts</button>
    </div>
    <div id="reminder-text"></div>
  </div>

  <!-- STATS STRIP -->
  <div id="stats-strip">
    <div class="stat-cell">
      <span class="stat-val" id="stat-xp">0</span>
      <span class="stat-lbl">Total XP</span>
    </div>
    <div class="stat-cell">
      <span class="stat-val" id="stat-streak">0 🔥</span>
      <span class="stat-lbl">Streak</span>
    </div>
    <div class="stat-cell">
      <span class="stat-val" id="stat-goals">0</span>
      <span class="stat-lbl">Goals Done</span>
    </div>
    <div class="stat-cell">
      <span class="stat-val" id="stat-tasks">0</span>
      <span class="stat-lbl">Tasks Done</span>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="active" onclick="FUBY.setTab('active')">Active <span id="active-count" style="opacity:.6;font-size:.75em;"></span></button>
    <button class="tab-btn" data-tab="done" onclick="FUBY.setTab('done')">Done</button>
    <button class="tab-btn" data-tab="all" onclick="FUBY.setTab('all')">All</button>
  </div>

  <!-- GOALS LIST -->
  <div id="goals-area">
    <div id="goals-container"></div>
  </div>

</div><!-- /#app -->

<!-- FAB -->
<div id="fab">
  <button class="fab-btn" onclick="FUBY.openAddGoal()">
    <span class="fab-plus">+</span> NEW GOAL
  </button>
</div>

<!-- ── ADD GOAL MODAL ───────────────────────────── -->
<div class="modal-overlay" id="modal-add-goal" onclick="if(event.target===this)FUBY.closeAddGoal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">NEW GOAL</h2>

    <div class="form-group">
      <label class="form-label" for="goal-title-input">Goal Title</label>
      <input class="form-input" id="goal-title-input" type="text" placeholder="e.g. Create a Post, Finish Assignment…" maxlength="80"
        onkeydown="if(event.key==='Enter')FUBY.submitAddGoal()" />
    </div>

    <div class="form-group">
      <label class="form-label" for="goal-due-input">Due Date (optional)</label>
      <input class="form-input" id="goal-due-input" type="date" />
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="FUBY.closeAddGoal()">Cancel</button>
      <button class="btn-primary" onclick="FUBY.submitAddGoal()">ADD GOAL</button>
    </div>
  </div>
</div>

<!-- ── LEVEL UP OVERLAY ─────────────────────────── -->
<div id="levelup-overlay" onclick="this.classList.remove('visible')">
  <div id="levelup-emoji">🌱</div>
  <div class="levelup-label">Level Up!</div>
  <div id="levelup-name">Rookie</div>
  <div class="levelup-sub">Tap anywhere to continue</div>
</div>

<script src="app.js"></script>

<script>
// ── INSTALL PROMPT ──────────────────────────────────────────
let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');
const dismissBtn    = document.getElementById('dismiss-install');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Only show if not dismissed before
  if (!localStorage.getItem('fuby_install_dismissed')) {
    installBanner.classList.add('show');
  }
});

installBtn && installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn && dismissBtn.addEventListener('click', () => {
  installBanner.classList.remove('show');
  localStorage.setItem('fuby_install_dismissed', '1');
});

// ── RANDOM REMINDER ON LOAD ─────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const reminders = [
    "🎯 Don't forget to tick at least one sub-task today — protect your streak!",
    "⚡ Your goals aren't going to complete themselves. You've got this.",
    "🌅 Morning check-in: What's one thing you'll finish today?",
    "🔥 Mid-day pulse check — how many tasks have you ticked?",
    "🌙 Evening wrap-up: Did you show up for your goals today?",
    "💎 Your streak is precious. Guard it every single day.",
    "👑 A FUBY Legend doesn't wait for motivation. They create it.",
    "📱 Open FUBY Tracker. Tick something. Feel the XP hit.",
    "⭐ Consistency beats intensity every single time.",
    "🏆 The finish line is just a bunch of ticked boxes. Keep ticking.",
  ];
  const el = document.getElementById('reminder-text');
  if (el) el.textContent = reminders[Math.floor(Math.random() * reminders.length)];
});
</script>

</body>
</html>
