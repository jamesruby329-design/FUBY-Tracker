<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <meta name="description" content="FUBY Tracker - Gamified Goal Tracker with Daily Affirmations">
    
    <title>FUBY Tracker - Level Up Your Goals</title>
    
    <style>
        /* ============================================
           FUBY TRACKER - PREMIUM DARK THEME CSS
           ============================================ */

        :root {
            --bg-dark: #080808;
            --bg-darker: #0f0f0f;
            --accent-gold: #f5c518;
            --accent-gold-dim: #d4a017;
            --accent-red: #c0392b;
            --accent-red-dark: #8b0000;
            --text-white: #ffffff;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
            --success-green: #27ae60;
            --success-gold: #f39c12;
            --border-color: #1a1a1a;
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.8);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.6);
            --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.4);
            --glow-gold: 0 0 20px rgba(245, 197, 24, 0.5);
            --glow-gold-strong: 0 0 30px rgba(245, 197, 24, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h1 { font-size: 2.5rem; }
        h2 { font-size: 1.8rem; }
        h3 { font-size: 1.3rem; }

        button {
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dim) 100%);
            color: var(--bg-dark);
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: var(--glow-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-gold-strong);
        }

        .btn-secondary {
            background-color: var(--bg-darker);
            color: var(--text-white);
            padding: 10px 20px;
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background-color: var(--accent-gold);
            color: var(--bg-dark);
        }

        .btn-secondary.btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-icon {
            background: transparent;
            color: var(--accent-gold);
            font-size: 1.5rem;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-close {
            background: transparent;
            color: var(--text-white);
            font-size: 1.5rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .header {
            background: linear-gradient(180deg, rgba(15, 15, 15, 0.95) 0%, rgba(8, 8, 8, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .app-title {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .level-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background-color: rgba(245, 197, 24, 0.1);
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
        }

        .level-emoji {
            font-size: 1.5rem;
        }

        .level-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .level-name {
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .xp-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(245, 197, 24, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--accent-gold);
        }

        .xp-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .xp-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .affirmation-banner {
            background: linear-gradient(135deg, rgba(192, 57, 43, 0.15) 0%, rgba(139, 0, 0, 0.1) 100%);
            border-bottom: 2px solid var(--accent-red);
            padding: 16px 20px;
            position: relative;
            animation: slideDown 0.4s ease;
        }

        .affirmation-banner.hidden {
            display: none;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-close-affirmation {
            position: absolute;
            top: 12px;
            right: 16px;
            background: transparent;
            color: var(--accent-red);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .affirmation-content {
            padding-right: 30px;
        }

        .affirmation-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .affirmation-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .app-container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .stats-quick {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-item {
            background-color: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 1.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            text-align: center;
        }

        .xp-progress-container {
            margin-bottom: 24px;
        }

        .xp-progress-bar {
            height: 12px;
            background-color: var(--bg-darker);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            margin-bottom: 8px;
        }

        .xp-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold-dim) 0%, var(--accent-gold) 100%);
            width: 0%;
            transition: width 0.6s ease;
            border-radius: 10px;
        }

        .xp-progress-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .tab-btn.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
        }

        .goals-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .goal-card {
            background-color: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .goal-card.completed {
            opacity: 0.7;
            border-color: var(--success-green);
        }

        .goal-card.overdue {
            border-color: var(--accent-red);
            background-color: rgba(192, 57, 43, 0.05);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .goal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-white);
            flex: 1;
            line-height: 1.4;
        }

        .goal-card.completed .goal-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .goal-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .goal-due {
            font-size: 0.8rem;
            padding: 4px 8px;
            background-color: rgba(192, 57, 43, 0.2);
            border: 1px solid var(--accent-red);
            border-radius: 4px;
            color: var(--accent-red);
        }

        .goal-due.upcoming {
            background-color: rgba(243, 156, 18, 0.2);
            border-color: var(--success-gold);
            color: var(--success-gold);
        }

        .goal-xp {
            font-size: 0.85rem;
            color: var(--accent-gold);
            font-weight: 600;
            background-color: rgba(245, 197, 24, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .goal-progress {
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 6px;
            background-color: var(--bg-dark);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold-dim) 0%, var(--accent-gold) 100%);
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .subtasks-container {
            margin-top: 12px;
        }

        .subtask-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background-color: rgba(8, 8, 8, 0.5);
            border-radius: 6px;
            margin-bottom: 8px;
            align-items: center;
        }

        .subtask-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-gold);
            flex-shrink: 0;
        }

        .subtask-text {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text-white);
        }

        .subtask-item input[type="checkbox"]:checked + .subtask-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .subtask-xp {
            font-size: 0.8rem;
            color: var(--accent-gold);
            font-weight: 600;
            flex-shrink: 0;
        }

        .goal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .goal-actions button {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dim) 100%);
            color: var(--bg-dark);
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-gold-strong), var(--shadow-lg);
            z-index: 99;
            cursor: pointer;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (min-width: 600px) {
            .modal-content {
                border-radius: 16px;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-white);
            font-size: 0.95rem;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-white);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.1);
        }

        .subtasks-list {
            background-color: var(--bg-dark);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .subtask-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .subtask-input-group input {
            flex: 1;
            padding: 8px 12px;
            background-color: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-white);
            font-size: 0.95rem;
        }

        .subtask-input-group button {
            background-color: var(--accent-red);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
        }

        .menu-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(245, 197, 24, 0.1) 0%, rgba(192, 57, 43, 0.05) 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-label {
            margin-bottom: 8px;
        }

        .stat-value-large {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
